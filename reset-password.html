<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازنشانی رمز | Simple Warmup</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .reset-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:2}
        .reset-card{width:100%;max-width:420px;padding:40px 32px;text-align:center}
        .reset-card h2{color:var(--ice2);margin-bottom:8px;font-size:22px}
        .reset-card p{color:rgba(179,236,255,.5);font-size:13px;margin-bottom:24px;line-height:1.8}
        .reset-card input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(125,211,252,.3);background:rgba(14,165,233,.1);color:#fff;font-size:16px;font-family:'Vazirmatn',sans-serif;outline:none;margin-bottom:16px;direction:ltr;text-align:center;letter-spacing:2px}
        .reset-card input:focus{border-color:var(--ice3);box-shadow:0 0 0 3px rgba(93,213,248,.15)}
        .btn-ice{width:100%;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Vazirmatn',sans-serif;letter-spacing:.5px;border:1px solid rgba(93,213,248,.5);background:linear-gradient(135deg,rgba(14,165,233,.25),rgba(93,213,248,.1));color:var(--ice2);backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 20px rgba(93,213,248,.15);border-radius:16px;transition:all .3s}
        .btn-ice:hover{transform:translateY(-3px);border-color:rgba(93,213,248,.8);box-shadow:0 15px 40px rgba(0,0,0,.4),0 0 40px rgba(93,213,248,.35);color:#fff}
        .btn-ice.primary{background:linear-gradient(135deg,rgba(93,213,248,.4),rgba(14,165,233,.25));border-color:rgba(93,213,248,.7)}
        .msg{font-size:14px;margin-top:16px;display:none;line-height:1.8}
        .msg.success{color:#86efac}
        .msg.error{color:#fca5a5}
        .msg a{color:var(--ice3);text-decoration:none;font-weight:600}
        .msg a:hover{color:#fff}
        .countdown{color:var(--gold);font-weight:700;font-size:18px}
    </style>
</head>
<body>
    <div class="mist-layer"><div class="mist mist-1"></div><div class="mist mist-2"></div><div class="mist mist-3"></div></div>
    
    <div class="reset-page">
        <div class="glass reset-card">
            <h2>🔒 رمز جدید</h2>
            <p>یه رمز قوی انتخاب کن<br>حداقل ۶ کاراکتر</p>
            <input type="password" id="newPassword" placeholder="••••••" minlength="6" autocomplete="new-password">
            <button class="btn-ice primary" id="updateBtn">💾 تغییر رمز</button>
            <p class="msg success" id="successMsg">✅ رمز با موفقیت تغییر کرد!<br><span class="countdown" id="countdown">۳</span> ثانیه دیگه برمی‌گردی به سایت...<br><br><a href="index.html">الان برو →</a></p>
            <p class="msg error" id="errorMsg"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://kmgtrqwcuuqdgrgmkvkf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttZ3RycXdjdXVxZGdyZ21rdmtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTY2MjIsImV4cCI6MjA5ODIzMjYyMn0.i22KZmspL89WZreO05p0PU4lP3UnYLfGPSZ-tOWo_b4';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('updateBtn').addEventListener('click', async () => {
            const password = document.getElementById('newPassword').value;
            const errorEl = document.getElementById('errorMsg');
            const successEl = document.getElementById('successMsg');
            
            if (password.length < 6) {
                errorEl.textContent = '❌ رمز باید حداقل ۶ کاراکتر باشه';
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                return;
            }
            
            const { error } = await supabase.auth.updateUser({ password });
            
            if (error) {
                errorEl.textContent = '❌ ' + error.message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
            } else {
                document.getElementById('newPassword').style.display = 'none';
                document.getElementById('updateBtn').style.display = 'none';
                errorEl.style.display = 'none';
                successEl.style.display = 'block';
                
                // شمارش معکوس برای ریدایرکت
                var count = 3;
                var countdownEl = document.getElementById('countdown');
                var timer = setInterval(function() {
                    count--;
                    countdownEl.textContent = count;
                    if (count <= 0) {
                        clearInterval(timer);
                        window.location.href = 'index.html';
                    }
                }, 1000);
            }
        });

        // اگه Enter بزنه
        document.getElementById('newPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('updateBtn').click();
        });
    </script>
</body>
</html>
